name: Docs

on:
  push:
    branches: [main]
    paths:
      - "README.md"
      - "docs/**"
      - "docs_overrides/**"
      - "mkdocs.yml"
  pull_request:
    branches: [main]
    paths:
      - "README.md"
      - "docs/**"
      - "docs_overrides/**"
      - "mkdocs.yml"

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install mkdocs-shadcn
      - run: mkdocs build --strict
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
