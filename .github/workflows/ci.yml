name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  repo-gate:
    name: Repo gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v5
      - run: uv venv --python 3.13
      - run: uv pip install "nautilus_trader[polymarket,visualization]==1.224.0" bokeh duckdb textual pytest ruff
      - run: uv run ruff check --exclude nautilus_pm .
      - run: uv run ruff format --check --exclude nautilus_pm .
      - run: uv run pytest tests/ -q
