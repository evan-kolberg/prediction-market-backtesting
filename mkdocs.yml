site_name: prediction-market-backtesting
site_url: https://evan-kolberg.github.io/prediction-market-backtesting/
repo_url: https://github.com/evan-kolberg/prediction-market-backtesting
repo_name: evan-kolberg/prediction-market-backtesting

theme:
  name: material
  palette:
    scheme: slate
    primary: black
  features:
    - navigation.instant
    - navigation.sections
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Setup: setup.md
  - Backtests And Runners: backtests.md
  - Execution Modeling: execution-modeling.md
  - PMXT BYOD And Local Data: pmxt-byod.md
  - PMXT Fetch Sources: pmxt-fetch-sources.md
  - PMXT Relay: pmxt-relay.md
  - Plotting: plotting.md
  - Testing: testing.md
  - Project Status: project-status.md
  - License Notes: license.md

markdown_extensions:
  - tables
  - fenced_code
  - codehilite
